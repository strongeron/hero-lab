# Triggers a Netlify production build on pushes to main.
#
# Why this exists rather than Netlify's own GitHub integration: the Netlify
# GitHub App does not have access to this repo, so no webhook is installed and
# nothing notifies Netlify when main moves. Adding the repo to the app needs an
# authorization click at github.com/settings/installations that an API token
# cannot perform.
#
# The first workaround was a raw repo webhook pointing straight at the build
# hook. That worked, but GitHub webhooks cannot filter by branch, so a push to
# ANY branch rebuilt main. This workflow does the same job with `branches: main`
# doing the filtering, and keeps the hook URL in a repo secret instead of in the
# webhook config.
#
# If the repo is later added to the Netlify GitHub App, delete this file — the
# app supersedes it and additionally gives PR deploy previews, which a build
# hook cannot.
name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify build
        env:
          HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "NETLIFY_BUILD_HOOK secret is not set" >&2
            exit 1
          fi
          # --fail so an error response fails the job instead of passing quietly.
          curl --fail --silent --show-error -X POST -d '{}' "$HOOK"
          echo "Netlify build triggered for main."
